---
layout: default
---
<style>
    .project-container { max-width: 900px; margin: 0 auto; padding: 40px; font-family: sans-serif; }
    .project-row { 
        display: flex; 
        align-items: center; 
        gap: 50px; 
        margin-bottom: 80px; 
    }
    /* This makes every second project flip sides */
    .project-row:nth-child(even) { flex-direction: row-reverse; }
    
    .project-text { flex: 1; }
    .project-image { 
        flex: 1; 
        background: #f0f0f0; 
        aspect-ratio: 16 / 9; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        border: 1px solid #ddd;
    }
    .year { color: #888; font-size: 0.9rem; margin-bottom: 5px; }
    h3 { margin: 5px 0; font-size: 1.5rem; }
    p { color: #444; line-height: 1.5; }
</style>

<div class="project-container">
    <h1>Projects</h1>
    {% for project in site.projects %}
    <div class="project-row">
        <div class="project-text">
            <div class="year">{{ project.date }}</div>
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
            <p><strong>{{ project.conference }}</strong></p>
        </div>
        <div class="project-image">
            <img src="{{ project.image }}" alt="{{ project.title }}" style="width:100%;">
        </div>
    </div>
    {% endfor %}
</div>
