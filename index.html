<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keegan Whitacre</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            text-align: left;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0;
            font-weight: 700;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        .bio {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .button-container {
            display: flex;
            gap: 15px;
        }
        .btn {
            background-color: #5b84b1; /* The blue from the screenshot */
            color: white;
            padding: 10px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #4a6d91;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="images/headshot.JPG" alt="Profile Picture" class="profile-pic">
            <div>
                <h1>Keegan Whitacre</h1>
                <p class="subtitle">The Ohio State University - Lab Manager</p>
            </div>
        </header>

        <section class="bio">
            I’m a multidisciplinary researcher with a background in... [Add your bio here]. 
            My approach combines empathy and clarity to design intuitive digital experiences.
        </section>

        <div class="button-container">
            <a href="projects.html" class="btn">Projects</a>
            <a href="cv.pdf" class="btn">CV</a>
        </div>
    </div>
</body>
</html>
